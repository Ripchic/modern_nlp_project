# Grafana provisioned datasources.
# Loaded automatically on startup.

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    uid: postgresql
    type: grafana-postgresql-datasource
    access: proxy
    url: postgres:5432
    user: $POSTGRES_USER
    editable: false
    jsonData:
      database: $POSTGRES_DB
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 600
    secureJsonData:
      password: $POSTGRES_PASSWORD
