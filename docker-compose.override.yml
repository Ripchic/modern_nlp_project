# Local development override — exposes ports to localhost ONLY (127.0.0.1).
# Loaded automatically when running `docker compose up` without -f flags.
# For remote VM / CI-CD, use docker-compose.prod.yml instead (see below).
#
# CI-CD command:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  api:
    ports:
      - "127.0.0.1:8000:8000"

  postgres:
    ports:
      - "127.0.0.1:5433:5432"

  redis:
    ports:
      - "127.0.0.1:6380:6379"

  qdrant:
    ports:
      - "127.0.0.1:6333:6333"

  prometheus:
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    ports:
      - "127.0.0.1:3000:3000"

  flower:
    ports:
      - "127.0.0.1:5555:5555"
