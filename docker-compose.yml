services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reviewmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewmind}
      POSTGRES_DB: ${POSTGRES_DB:-reviewmind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reviewmind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reviewmind} -d ${POSTGRES_DB:-reviewmind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - reviewmind-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - reviewmind-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Application ────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-reviewmind}:${POSTGRES_PASSWORD:-reviewmind}@postgres:5432/${POSTGRES_DB:-reviewmind}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    networks:
      - reviewmind-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: ["uvicorn", "reviewmind.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-reviewmind}:${POSTGRES_PASSWORD:-reviewmind}@postgres:5432/${POSTGRES_DB:-reviewmind}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    networks:
      - reviewmind-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: ["python", "-m", "reviewmind.bot.main"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-reviewmind}:${POSTGRES_PASSWORD:-reviewmind}@postgres:5432/${POSTGRES_DB:-reviewmind}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    networks:
      - reviewmind-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "reviewmind.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]

  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-reviewmind}:${POSTGRES_PASSWORD:-reviewmind}@postgres:5432/${POSTGRES_DB:-reviewmind}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    networks:
      - reviewmind-network
    depends_on:
      - worker
    command: ["celery", "-A", "reviewmind.workers.celery_app", "beat", "--loglevel=info"]

  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    networks:
      - reviewmind-network
    depends_on:
      - worker
    command: ["celery", "-A", "reviewmind.workers.celery_app", "flower", "--port=5555"]

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────

networks:
  reviewmind-network:
    driver: bridge
