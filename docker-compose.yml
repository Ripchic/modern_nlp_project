services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reviewmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewmind}
      POSTGRES_DB: ${POSTGRES_DB:-reviewmind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reviewmind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reviewmind} -d ${POSTGRES_DB:-reviewmind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - reviewmind-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - reviewmind-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Application ────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-reviewmind}:${POSTGRES_PASSWORD:-reviewmind}@postgres:5432/${POSTGRES_DB:-reviewmind}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    networks:
      - reviewmind-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: ["uvicorn", "reviewmind.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; r=urllib.request.urlopen('http://localhost:8000/health'); exit(0 if r.status==200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-reviewmind}:${POSTGRES_PASSWORD:-reviewmind}@postgres:5432/${POSTGRES_DB:-reviewmind}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    networks:
      - reviewmind-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: ["python", "-m", "reviewmind.bot.main"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-reviewmind}:${POSTGRES_PASSWORD:-reviewmind}@postgres:5432/${POSTGRES_DB:-reviewmind}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    networks:
      - reviewmind-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "reviewmind.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]

  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-reviewmind}:${POSTGRES_PASSWORD:-reviewmind}@postgres:5432/${POSTGRES_DB:-reviewmind}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    networks:
      - reviewmind-network
    depends_on:
      - worker
    command: ["celery", "-A", "reviewmind.workers.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]

  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    networks:
      - reviewmind-network
    depends_on:
      - worker
    command: ["celery", "-A", "reviewmind.workers.celery_app", "flower", "--port=5555"]

  # ── Monitoring ───────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - reviewmind-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_USER: ${POSTGRES_USER:-reviewmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewmind}
      POSTGRES_DB: ${POSTGRES_DB:-reviewmind}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - reviewmind-network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────

networks:
  reviewmind-network:
    driver: bridge
