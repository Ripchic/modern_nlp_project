# Production override — exposes public ports, no local-dev port overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  api:
    ports:
      - "8000:8000"

  flower:
    ports:
      - "5555:5555"

  bot:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HTTPS_PROXY=http://host.docker.internal:1081
      - HTTP_PROXY=http://host.docker.internal:1081
      - NO_PROXY=localhost,127.0.0.1,postgres,redis,qdrant

  worker:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HTTPS_PROXY=http://host.docker.internal:1081
      - HTTP_PROXY=http://host.docker.internal:1081
      - NO_PROXY=localhost,127.0.0.1,postgres,redis,qdrant
